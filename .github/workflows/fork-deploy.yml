name: Fork – Build & Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 970547373533.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: manimcat
  EKS_CLUSTER: ai-cart-auto-cluster
  K8S_NAMESPACE: aicart

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "Image tag: $SHA"

      - name: Build & push Docker image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -t $ECR_REGISTRY/$ECR_REPO:${{ steps.tag.outputs.tag }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPO --all-tags

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Deploy to EKS
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          echo "Updating manimcat image to :$TAG ..."
          kubectl set image deployment/manimcat \
            manimcat=$ECR_REGISTRY/$ECR_REPO:$TAG \
            -n $K8S_NAMESPACE

      - name: Restart deployment
        run: kubectl rollout restart deployment/manimcat -n $K8S_NAMESPACE

      - name: Wait for rollout
        run: |
          echo "Waiting for manimcat rollout..."
          kubectl rollout status deployment/manimcat -n $K8S_NAMESPACE --timeout=5m || true

      - name: Verify pods
        if: always()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n $K8S_NAMESPACE -l app=manimcat -o wide
          echo ""
          echo "=== Pod Logs (last 80 lines) ==="
          for pod in $(kubectl get pods -n $K8S_NAMESPACE -l app=manimcat -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod ---"
            kubectl logs "$pod" -n $K8S_NAMESPACE --tail=80 2>&1 || echo "(no logs)"
            echo ""
          done
          echo "=== Recent Events ==="
          kubectl get events -n $K8S_NAMESPACE --sort-by='.lastTimestamp' | grep -i manimcat | tail -20
